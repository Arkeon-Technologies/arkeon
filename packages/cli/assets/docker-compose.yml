# Arkeon local quickstart stack.
#
# This is the docker-compose.yml that ships inside the `arkeon` npm package
# and gets written to cwd by `arkeon init`. It pulls the published image
# from GitHub Container Registry instead of building from source, so a user
# who only has npm + Docker can run the full stack without cloning the
# monorepo.
#
# Override the image tag by setting ARKEON_IMAGE_TAG in .env (default: latest).
# Contributors working from a git checkout should use the compose file at
# the repo root, which builds from local source via `build: { target: ... }`.

services:
  # API waits for migrate to complete successfully before starting, so
  # `docker compose up` always runs pending migrations before the API boots.
  api:
    image: "ghcr.io/arkeon-technologies/arkeon:${ARKEON_IMAGE_TAG:-latest}"
    command: ["npx", "tsx", "packages/api/src/index.ts"]
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - path: .env
        required: false
    environment:
      # ARKE_APP_PASSWORD is required so the api and migrate services
      # agree on the runtime role's password. The default DATABASE_URL
      # below reads it directly; override DATABASE_URL in .env only for
      # host mode against an external Postgres — see .env.example.
      ARKE_APP_PASSWORD: "${ARKE_APP_PASSWORD:?ARKE_APP_PASSWORD is required — see .env.example}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://arke_app:${ARKE_APP_PASSWORD}@postgres:5432/arke}"
      ADMIN_BOOTSTRAP_KEY: "${ADMIN_BOOTSTRAP_KEY:?ADMIN_BOOTSTRAP_KEY is required — see .env.example}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ENCRYPTION_KEY is required — see .env.example}"
      MEILI_URL: "${MEILI_URL:-http://meilisearch:7700}"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required — see .env.example}"
      ENABLE_KNOWLEDGE_PIPELINE: "${ENABLE_KNOWLEDGE_PIPELINE:-false}"
    stop_grace_period: 330s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: arke
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}"
      POSTGRES_DB: arke
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arke"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data

  meilisearch:
    image: getmeili/meilisearch:v1
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required — see .env.example}"
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: "ghcr.io/arkeon-technologies/arkeon:${ARKEON_IMAGE_TAG:-latest}"
    command: ["node", "packages/schema/migrate.js"]
    env_file:
      - path: .env
        required: false
    environment:
      # Migrate runs DDL as the superuser. Defaults build the URL from
      # POSTGRES_PASSWORD; override MIGRATION_DATABASE_URL in .env to
      # point at an external database.
      #
      # NOTE: POSTGRES_PASSWORD is embedded into the URL verbatim — it
      # must be URL-safe (alphanumeric recommended). Passwords containing
      # @, :, /, ?, #, or $ will either break URL parsing or be
      # re-interpolated by compose. If you need a password with special
      # characters, set MIGRATION_DATABASE_URL explicitly with the
      # password percent-encoded.
      DATABASE_URL: "${MIGRATION_DATABASE_URL:-postgresql://arke:${POSTGRES_PASSWORD}@postgres:5432/arke}"
      # Applied by migrate.js to the arke_app role on every run, so
      # rotation is just "edit .env, re-run migrate".
      ARKE_APP_PASSWORD: "${ARKE_APP_PASSWORD:?ARKE_APP_PASSWORD is required — see .env.example}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  meilidata:
