[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "arkeon-sdk"
version = "0.1.2"
description = "Lightweight Python SDK for the Arkeon API"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "Arkeon Technologies" }]
readme = "README.md"
dependencies = ["httpx>=0.24"]

[project.urls]
Homepage = "https://github.com/Arkeon-Technologies/arkeon"
