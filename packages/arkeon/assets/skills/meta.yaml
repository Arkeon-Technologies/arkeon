# Skill metadata and per-provider frontmatter.
# Body content lives in body/<skill>.md — this file only defines metadata
# and provider-specific frontmatter fields that get composed at build time.

skills:
  arkeon-ingest:
    description: "Initialize a repo as an Arkeon knowledge base and build a knowledge graph from its documents."
    argument-hint: "[space-name]"
  arkeon-connect:
    description: "Find and create relationships between entities across different spaces in the graph."
    argument-hint: "[topic or entity name]"
  arkeon-doctor:
    description: "Diagnose the health of a local Arkeon installation: version, stack, database, config."
    argument-hint: ""
  arkeon-recall:
    description: "Pull relevant knowledge from the Arkeon graph into the conversation as a structured brief."
    argument-hint: "<topic>"

providers:
  claude:
    format: skill-dir
    dir: "~/.claude/skills"
    global: true
    frontmatter:
      common:
        disable-model-invocation: true
      per-skill:
        arkeon-ingest:
          allowed-tools: "Bash(npx arkeon *, arkeon *, ls *), Read, Glob, Grep, Write, Agent"
        arkeon-connect:
          allowed-tools: "Bash(npx arkeon *, arkeon *, ls *), Read, Glob, Grep, Write, Agent"
        arkeon-doctor:
          allowed-tools: "Bash(arkeon *, npx arkeon *, npm view arkeon *, curl *, ls *, cat *), Read, Glob, Grep"
        arkeon-recall:
          allowed-tools: "Bash(npx arkeon *, arkeon *, curl *), Read, Glob, Grep"

  codex:
    format: skill-dir
    dir: "~/.codex/skills"
    global: true
    frontmatter:
      common: {}
      per-skill: {}

  cursor:
    format: cursor-commands
    dir: ".cursor/commands"
    global: false
    frontmatter:
      common: {}
      per-skill: {}

  gemini:
    format: skill-dir
    dir: "~/.gemini/skills"
    global: true
    frontmatter:
      common: {}
      per-skill: {}
