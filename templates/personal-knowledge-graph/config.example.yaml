# Personal Knowledge Graph - Configuration
# Copy this file to config.yaml and fill in your values.

# ── Arkeon connection ───────────────────────────────────────────────
arkeon:
  api_url: "https://your-instance.arkeon.tech"   # Your Arkeon instance URL
  api_key: "ak_..."                               # Your personal API key

# ── Space settings ──────────────────────────────────────────────────
space:
  name: "My Knowledge Graph"
  description: "Personal knowledge graph built by the dreamer and tidier workers"

# ── LLM provider (any OpenAI-compatible API) ────────────────────────
llm:
  base_url: "https://api.anthropic.com/v1"
  api_key: "sk-ant-..."
  model: "claude-sonnet-4-20250514"

# ── Dreamer worker (content analysis) ──────────────────────────────
# Analyzes new content, extracts concepts/people/observations, builds
# relationships. When idle, reflects on existing content for deeper insights.
dreamer:
  name: "dreamer"                # Worker name (shown in API)
  schedule: "0 */4 * * *"       # Every 4 hours (00:00, 04:00, 08:00, ...)
  max_iterations: 30             # Max LLM turns per run (higher = more thorough)

# ── Tidier worker (graph maintenance) ──────────────────────────────
# Merges duplicate entities, removes low-quality entries, verifies
# relationships. Runs offset from the dreamer to avoid overlap.
tidier:
  name: "tidier"                 # Worker name (shown in API)
  schedule: "0 2-22/4 * * *"    # Every 4 hours offset by 2h (02:00, 06:00, ...)
  max_iterations: 15             # Fewer iterations needed for maintenance

# ── Extraction priorities ───────────────────────────────────────────
# Customize what the dreamer focuses on when analyzing your content.
priorities:
  # Themes to pay extra attention to (soft hints, not hard filters).
  # The dreamer will still extract other themes it discovers.
  themes:
    - "theology"
    - "philosophy"
    - "distributed systems"

  # How much detail to extract per piece of content:
  #   low    = major themes only
  #   medium = themes + key people + notable claims
  #   high   = everything including fine-grained sub-concepts and temporal observations
  detail_level: "medium"

  # What entity types to extract
  extract_people: true           # Extract person entities mentioned in content
  extract_concepts: true         # Extract abstract concept/theme entities
