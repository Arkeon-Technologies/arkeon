name: License Headers

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Check SPDX headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify every source file has an SPDX header
        run: |
          set -euo pipefail

          mapfile -t files < <(find packages scripts -type f \
            \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.mjs" -o -name "*.cjs" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" \
            -not -path "*/.next/*" \
            -not -path "*/generated/*")

          missing=()
          for f in "${files[@]}"; do
            if ! head -4 "$f" | grep -q "SPDX-License-Identifier"; then
              missing+=("$f")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::The following source files are missing the SPDX license header:"
            printf '  %s\n' "${missing[@]}"
            echo ""
            echo "Add this header to the top of each file:"
            echo ""
            echo "  // Copyright (c) 2026 Arkeon Technologies, Inc."
            echo "  // SPDX-License-Identifier: Apache-2.0"
            echo ""
            exit 1
          fi

          echo "All ${#files[@]} source files have SPDX headers."
