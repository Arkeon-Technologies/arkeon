name: Auto-Publish Packages on Change

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/src/**'
      - 'packages/sdk-ts/src/**'
      - 'packages/sdk-python/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      sdk-ts: ${{ steps.filter.outputs.sdk-ts }}
      sdk-python: ${{ steps.filter.outputs.sdk-python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'packages/cli/src/**'
            sdk-ts:
              - 'packages/sdk-ts/src/**'
            sdk-python:
              - 'packages/sdk-python/**'

  publish-cli:
    needs: detect-changes
    if: needs.detect-changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # CLI's `fetch-spec` step imports the API to render the OpenAPI snapshot,
      # and the API's knowledge service imports `@arkeon-technologies/sdk` from
      # its built dist. Build the SDK first so the import resolves.
      - name: Build SDK (required by CLI fetch-spec via API import)
        run: npm run build -w packages/sdk-ts

      - name: Build CLI
        run: npm run build -w packages/cli

      - name: Publish next patch version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/cli
          PKG=$(node -p "require('./package.json').name")
          LATEST=$(npm view "$PKG" version 2>/dev/null || echo "0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          npm version "$NEXT" --no-git-tag-version
          npm publish --access public

  publish-sdk-ts:
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk-ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript SDK
        run: npm run build -w packages/sdk-ts

      - name: Publish next patch version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/sdk-ts
          PKG=$(node -p "require('./package.json').name")
          LATEST=$(npm view "$PKG" version 2>/dev/null || echo "0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          npm version "$NEXT" --no-git-tag-version
          npm publish --access public

  publish-sdk-python:
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk-python == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bump to next patch version
        run: |
          cd packages/sdk-python
          PKG=$(grep '^name = ' pyproject.toml | sed 's/name = "\(.*\)"/\1/')
          LATEST=$(pip index versions "$PKG" 2>/dev/null | head -1 | sed 's/.*(\(.*\))/\1/' || echo "0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version = .*/version = \"${NEXT}\"/" pyproject.toml
          echo "Publishing version ${NEXT}"

      - name: Build package
        run: |
          pip install build
          cd packages/sdk-python
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist/
