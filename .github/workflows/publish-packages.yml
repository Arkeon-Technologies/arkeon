name: Publish Packages (npm + PyPI)

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set package versions
        run: |
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version -w packages/cli
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version -w packages/sdk-ts

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build -w packages/cli

      - name: Build TypeScript SDK
        run: npm run build -w packages/sdk-ts

      - name: Publish CLI
        run: npm publish -w packages/cli --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish TypeScript SDK
        run: npm publish -w packages/sdk-ts --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set package version
        run: |
          cd packages/sdk-python
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.VERSION }}\"/" pyproject.toml

      - name: Build Python package
        run: |
          pip install build
          cd packages/sdk-python
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/sdk-python/dist/
