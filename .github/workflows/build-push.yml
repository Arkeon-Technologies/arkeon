name: Test, Build, and Push to ECR

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/cli/src/**'
      - 'packages/cli/scripts/**'
      - 'packages/cli/spec/**'
      - 'packages/cli/package.json'
      - 'packages/sdk-ts/src/**'
      - 'packages/sdk-ts/package.json'
      - 'packages/schema/**'
      - 'packages/runtime/**'
      - 'Dockerfile'
      - 'docker-compose.ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/cli/src/**'
      - 'packages/cli/scripts/**'
      - 'packages/cli/spec/**'
      - 'packages/cli/package.json'
      - 'packages/sdk-ts/src/**'
      - 'packages/sdk-ts/package.json'
      - 'packages/schema/**'
      - 'packages/runtime/**'
      - 'Dockerfile'
      - 'docker-compose.ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-push.yml'

jobs:
  test-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test dependencies
        run: npm ci --workspace=packages/api

      - name: Build Docker image
        run: docker build -t arke:ci .

      - name: Start test stack
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start within 60s"
          docker compose -f docker-compose.ci.yml logs
          exit 1

      - name: Run e2e tests
        env:
          E2E_BASE_URL: http://localhost:8000
          ADMIN_BOOTSTRAP_KEY: ak_test_ci_key
        run: npm run test:e2e -w packages/api

      - name: Teardown test stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

      # Push steps below run only on push-to-main, not on pull_request runs.
      # PR runs validate the build + e2e suite without exposing AWS secrets
      # to forked-PR contexts or polluting ECR with pre-merge images.
      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push to ECR
        if: github.event_name != 'pull_request'
        env:
          ECR_REPO: ${{ secrets.ECR_REPO }}
        run: |
          docker tag arke:ci $ECR_REPO:latest
          docker tag arke:ci $ECR_REPO:sha-${GITHUB_SHA::8}
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:sha-${GITHUB_SHA::8}

  check-cli-spec-drift:
    # Fails if `packages/cli/spec/openapi.snapshot.json` or
    # `packages/cli/src/generated/index.ts` are out of date relative to the
    # live API surface. PR authors fix drift locally with
    # `npm run build -w packages/cli` and commit the result, so API-surface
    # changes show up in the PR diff where reviewers can see them.
    #
    # No `needs: test-and-push` — this is a pure static check on the spec
    # and runs independently so drift is visible even when the runtime
    # suite is red.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # CLI's `fetch-spec` step imports the API to render the OpenAPI snapshot,
      # and the API's knowledge service imports `@arkeon-technologies/sdk` from
      # its built dist. Build the SDK first so the import resolves.
      - name: Build SDK (required by CLI fetch-spec via API import)
        run: npm run build -w packages/sdk-ts

      - name: Regenerate CLI spec + generated commands
        run: npm run build -w packages/cli

      - name: Fail if checked-in CLI spec is stale
        run: |
          if ! git diff --quiet packages/cli/spec/openapi.snapshot.json packages/cli/src/generated/index.ts; then
            echo "::error::packages/cli/spec/openapi.snapshot.json or packages/cli/src/generated/index.ts is out of date relative to the current API surface."
            echo ""
            echo "Fix:"
            echo "  npm run build -w packages/cli"
            echo "  git add packages/cli/spec/openapi.snapshot.json packages/cli/src/generated/index.ts"
            echo "  git commit"
            echo ""
            echo "Drift detected:"
            git --no-pager diff --stat packages/cli/spec/openapi.snapshot.json packages/cli/src/generated/index.ts
            git --no-pager diff packages/cli/spec/openapi.snapshot.json packages/cli/src/generated/index.ts
            exit 1
          fi
          echo "CLI spec is in sync with API."
