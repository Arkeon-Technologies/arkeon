name: Test and Check CLI Drift

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/cli/**'
      - 'packages/sdk-ts/**'
      - 'packages/schema/**'
      - 'packages/runtime/**'
      - 'packages/shared/**'
      - 'packages/explorer/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/cli/**'
      - 'packages/sdk-ts/**'
      - 'packages/schema/**'
      - 'packages/runtime/**'
      - 'packages/shared/**'
      - 'packages/explorer/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-push.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Worker sandbox tests need bubblewrap on the host. It's not in the
      # default GitHub runner image, but apt has it. curl/jq/python3 are
      # already present.
      - name: Install worker toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends bubblewrap

      - name: Install dependencies
        run: npm ci

      # Build SDK + explorer BEFORE typecheck. packages/api imports
      # @arkeon-technologies/sdk from its built dist (via knowledge/lib/
      # arke-client.ts), so the CLI-level typecheck of the API package
      # requires packages/sdk-ts/dist to exist. Same deal for the CLI's
      # explorer bundle-step in subsequent builds.
      - name: Build SDK
        run: npm run build -w packages/sdk-ts

      - name: Build explorer SPA
        run: npm run build -w @arkeon-technologies/explorer

      - name: Typecheck API
        run: npm run typecheck -w packages/api

      - name: Typecheck CLI
        run: npm run typecheck -w packages/cli

      - name: CLI unit tests
        run: npm test -w packages/cli

      # Start the full Arkeon stack via the CLI: embedded Postgres, Meilisearch
      # (downloaded on first run, cached between runs via GHA cache), schema
      # migrations, API. No Docker required.
      - name: Cache Arkeon local dir
        id: cache-arkeon
        uses: actions/cache@v4
        with:
          path: ~/.arkeon/bin
          key: arkeon-bin-${{ runner.os }}-${{ runner.arch }}-meili-1.41.0

      - name: Start Arkeon stack
        run: |
          nohup npx tsx packages/cli/src/index.ts start \
            --port 8000 \
            --pg-port 15433 \
            --meili-port 17700 \
            > /tmp/arkeon.log 2>&1 &
          echo $! > /tmp/arkeon.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start within 120s"
          echo "--- log ---"
          cat /tmp/arkeon.log
          exit 1

      - name: Extract admin key
        id: adminkey
        run: |
          key=$(grep "Admin API key" /tmp/arkeon.log | tail -1 | awk '{print $NF}')
          echo "ADMIN_BOOTSTRAP_KEY=$key" >> "$GITHUB_ENV"

      - name: Run API e2e tests
        env:
          E2E_BASE_URL: http://localhost:8000
        run: npm run test:e2e -w packages/api

      - name: Stop Arkeon stack
        if: always()
        run: |
          if [ -f /tmp/arkeon.pid ]; then
            kill -TERM "$(cat /tmp/arkeon.pid)" 2>/dev/null || true
            wait "$(cat /tmp/arkeon.pid)" 2>/dev/null || true
          fi

      - name: Tail Arkeon log on failure
        if: failure()
        run: tail -200 /tmp/arkeon.log || true

  check-cli-spec-drift:
    # Fails if any of the three checked-in generated files are out of
    # date relative to their sources:
    #   - packages/cli/spec/openapi.snapshot.json    <- live API surface
    #   - packages/cli/src/generated/index.ts        <- openapi.snapshot.json
    #   - packages/cli/src/generated/assets.ts       <- Genesis seed envelope
    #
    # PR authors fix drift locally with `npm run build -w packages/cli`
    # (which runs fetch-spec + generate + bundle-assets ahead of tsup)
    # and commit the result, so both API-surface changes and bundled-
    # asset changes show up in the PR diff where reviewers can see them.
    #
    # No `needs: test` — this is a pure static check and runs
    # independently so drift is visible even when the runtime suite is red.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # CLI's `fetch-spec` step imports the API to render the OpenAPI snapshot,
      # and the API's knowledge service imports `@arkeon-technologies/sdk` from
      # its built dist. Build the SDK first so the import resolves.
      - name: Build SDK (required by CLI fetch-spec via API import)
        run: npm run build -w packages/sdk-ts

      # The CLI build runs bundle-explorer, which expects the explorer
      # SPA to already be built. Do that ahead of the CLI build so the
      # copy-explorer step finds packages/explorer/dist.
      - name: Build explorer SPA (required by CLI bundle-explorer)
        run: npm run build -w @arkeon-technologies/explorer

      - name: Regenerate CLI spec + generated commands + bundled assets
        run: npm run build -w packages/cli

      - name: Fail if checked-in generated files are stale
        run: |
          GENERATED=(
            packages/cli/spec/openapi.snapshot.json
            packages/cli/src/generated/index.ts
            packages/cli/src/generated/assets.ts
          )
          if ! git diff --quiet "${GENERATED[@]}"; then
            echo "::error::One or more checked-in generated CLI files are out of date."
            echo ""
            echo "Fix:"
            echo "  npm run build -w packages/cli"
            echo "  git add ${GENERATED[*]}"
            echo "  git commit"
            echo ""
            echo "Drift detected:"
            git --no-pager diff --stat "${GENERATED[@]}"
            git --no-pager diff "${GENERATED[@]}"
            exit 1
          fi
          echo "CLI generated files are in sync with their sources."
