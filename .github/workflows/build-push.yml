name: Test, Build, and Push to ECR

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/cli/src/**'
      - 'packages/sdk-ts/src/**'
      - 'packages/schema/**'
      - 'packages/runtime/**'
      - 'Dockerfile'
      - 'docker-compose.ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/cli/src/**'
      - 'packages/sdk-ts/src/**'
      - 'packages/schema/**'
      - 'packages/runtime/**'
      - 'Dockerfile'
      - 'docker-compose.ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-push.yml'

jobs:
  test-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test dependencies
        run: npm ci --workspace=packages/api

      - name: Build Docker image
        run: docker build -t arke:ci .

      - name: Start test stack
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start within 60s"
          docker compose -f docker-compose.ci.yml logs
          exit 1

      - name: Run e2e tests
        env:
          E2E_BASE_URL: http://localhost:8000
          ADMIN_BOOTSTRAP_KEY: ak_test_ci_key
        run: npm run test:e2e -w packages/api

      - name: Teardown test stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

      # Push steps below run only on push-to-main, not on pull_request runs.
      # PR runs validate the build + e2e suite without exposing AWS secrets
      # to forked-PR contexts or polluting ECR with pre-merge images.
      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push to ECR
        if: github.event_name != 'pull_request'
        env:
          ECR_REPO: ${{ secrets.ECR_REPO }}
        run: |
          docker tag arke:ci $ECR_REPO:latest
          docker tag arke:ci $ECR_REPO:sha-${GITHUB_SHA::8}
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:sha-${GITHUB_SHA::8}

  regenerate-cli-spec:
    # Regenerates the CLI's OpenAPI snapshot against the current API and
    # commits it back to main so the checked-in CLI codegen never drifts.
    # Releases are separate — see .github/workflows/publish.yml.
    if: github.event_name != 'pull_request'
    needs: test-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build SDK (required by CLI fetch-spec via API import)
        run: npm run build -w packages/sdk-ts

      - name: Build CLI (fetch spec + generate + bundle)
        run: npm run build -w packages/cli

      - name: Check if API surface changed
        id: check
        run: |
          if git diff --quiet packages/cli/spec/openapi.snapshot.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit regenerated CLI spec
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/spec/openapi.snapshot.json packages/cli/src/generated/index.ts
          git commit -m "chore: regenerate CLI spec from current API [skip ci]"
          git push
