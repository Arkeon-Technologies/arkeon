name: Test, Build, and Push to ECR

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/schema/**'
      - 'packages/runtime/**'
      - 'Dockerfile'
      - 'docker-compose.ci.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  test-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test dependencies
        run: npm ci --workspace=packages/api

      - name: Build Docker image
        run: docker build -t arke:ci .

      - name: Start test stack
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start within 60s"
          docker compose -f docker-compose.ci.yml logs
          exit 1

      - name: Run e2e tests
        env:
          E2E_BASE_URL: http://localhost:8000
          ADMIN_BOOTSTRAP_KEY: ak_test_ci_key
        run: npm run test:e2e -w packages/api

      - name: Teardown test stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push to ECR
        env:
          ECR_REPO: 071493678184.dkr.ecr.us-east-1.amazonaws.com/arke
        run: |
          docker tag arke:ci $ECR_REPO:latest
          docker tag arke:ci $ECR_REPO:sha-${GITHUB_SHA::8}
          docker push $ECR_REPO:latest
          docker push $ECR_REPO:sha-${GITHUB_SHA::8}

  publish-cli:
    needs: test-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build CLI (fetch spec + generate + bundle)
        run: npm run build -w packages/cli

      - name: Check if API surface changed
        id: check
        run: |
          if git diff --quiet packages/cli/spec/openapi.snapshot.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version and publish to npm
        if: steps.check.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/cli
          npm version patch --no-git-tag-version
          npm publish --access public
