name: Publish

# Triggered by publishing a GitHub Release. The tag prefix selects which
# package is published:
#   arkeon-v<version>  → publishes `arkeon` (CLI) to npm
#   sdk-v<version>     → publishes `@arkeon-technologies/sdk` to npm
#
# Releases via UI: https://github.com/Arkeon-Technologies/arkeon/releases/new
# Releases via CLI: gh release create arkeon-v0.0.2 --generate-notes
#
# Both packages are trusted publishers of this workflow file on npm (OIDC),
# so no npm token is needed — the jobs publish with `--provenance` to
# attach a verifiable supply-chain attestation.

on:
  release:
    types: [published]

jobs:
  publish-cli:
    if: startsWith(github.ref, 'refs/tags/arkeon-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#arkeon-v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      # CLI's `fetch-spec` step imports the API to render the OpenAPI snapshot,
      # and the API's knowledge service imports `@arkeon-technologies/sdk` from
      # its built dist. Build the SDK first so the import resolves.
      - name: Build SDK (required by CLI fetch-spec via API import)
        run: npm run build -w packages/sdk-ts

      - name: Build CLI
        run: npm run build -w packages/cli

      - name: Set package version from tag
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version -w packages/cli

      - name: Publish to npm
        run: npm publish -w packages/cli --access public --provenance

  publish-sdk-ts:
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#sdk-v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build -w packages/sdk-ts

      - name: Set package version from tag
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version -w packages/sdk-ts

      - name: Publish to npm
        run: npm publish -w packages/sdk-ts --access public --provenance
