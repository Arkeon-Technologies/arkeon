services:
  # API waits for migrate to complete successfully before starting, so
  # `docker compose up` always runs pending migrations before the API boots.
  api:
    build:
      context: .
      target: api
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://arke_app:arke@postgres:5432/arke}"
      ADMIN_BOOTSTRAP_KEY: "${ADMIN_BOOTSTRAP_KEY:?ADMIN_BOOTSTRAP_KEY is required — see .env.example}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?ENCRYPTION_KEY is required — see .env.example}"
      MEILI_URL: "${MEILI_URL:-http://meilisearch:7700}"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required — see .env.example}"
      ENABLE_KNOWLEDGE_PIPELINE: "${ENABLE_KNOWLEDGE_PIPELINE:-false}"
    stop_grace_period: 330s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        # Hot-reload: sync API/runtime/shared source changes → tsx watch restarts
        - action: sync
          path: ./packages/api/src
          target: /app/packages/api/src
        - action: sync
          path: ./packages/runtime/src
          target: /app/packages/runtime/src
        - action: sync
          path: ./packages/shared/src
          target: /app/packages/shared/src
        # Rebuild: CLI, SDK, or dependency changes require a full image rebuild
        - action: rebuild
          path: ./packages/cli
        - action: rebuild
          path: ./packages/sdk-ts
        - action: rebuild
          path: package-lock.json

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: arke
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}"
      POSTGRES_DB: arke
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arke"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data

  meilisearch:
    image: getmeili/meilisearch:v1
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required — see .env.example}"
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrate
    env_file:
      - path: .env
        required: false
    environment:
      # Migrate runs DDL as the superuser. Defaults build the URL from
      # POSTGRES_PASSWORD; override MIGRATION_DATABASE_URL in .env to
      # point at an external database.
      #
      # NOTE: POSTGRES_PASSWORD is embedded into the URL verbatim — it
      # must be URL-safe (alphanumeric recommended). Passwords containing
      # @, :, /, ?, #, or $ will either break URL parsing or be
      # re-interpolated by compose. If you need a password with special
      # characters, set MIGRATION_DATABASE_URL explicitly with the
      # password percent-encoded.
      DATABASE_URL: "${MIGRATION_DATABASE_URL:-postgresql://arke:${POSTGRES_PASSWORD}@postgres:5432/arke}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  meilidata:
